set -g mouse on
set-option -g history-limit 5000
setw -g mode-keys vi
set -g default-terminal "xterm-256color"
# Pass through true color (RGB) escape sequences to the outer terminal
set -ag terminal-overrides ",xterm-256color:RGB"
# Propagate COLORTERM so neovim knows true color is available
set-environment -g COLORTERM "truecolor"
# Allows escape sequences pass through tmux directly to the host terminal without tmux intercepting them
set -g allow-passthrough on

# Alternate prefix
set-option -g prefix2 M-z
bind-key M-z send-prefix -2

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D