set -g mouse on
set-option -g history-limit 5000
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Ms=\\E]52;%p1%s;%p2%s\\007"
set-environment -g COLORTERM "truecolor"
set-environment -g LANG "C.UTF-8"
set -g allow-passthrough all
set -g set-clipboard on

# Alternate prefix
set-option -g prefix2 M-z
bind-key M-z send-prefix -2

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Toggle opencode window (Alt+z o)
# From nvim/terminal windows: switches to opencode window
# From opencode window: switches back to nvim window
bind o if-shell '[ "#{window_name}" = "opencode" ]' \
  'select-window -t neovim:nvim' \
  'select-window -t neovim:opencode'

# Toggle terminal window (Alt+z t)
# From nvim/opencode windows: switches to terminal window
# From terminal window: switches back to nvim window
bind t if-shell '[ "#{window_name}" = "terminal" ]' \
  'select-window -t neovim:nvim' \
  'select-window -t neovim:terminal'

# Kill all windows and exit container (with confirmation)
bind q confirm-before -p "Kill all windows and exit container? (y/n) " kill-server
