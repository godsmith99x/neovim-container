set -g mouse on
set-option -g history-limit 5000
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Ms=\\E]52;%p1%s;%p2%s\\007"
set-environment -g COLORTERM "truecolor"
set-environment -g LANG "C.UTF-8"
set -g allow-passthrough all
set -g set-clipboard on

# Alternate prefix
set-option -g prefix2 M-z
bind-key M-z send-prefix -2

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Direct window navigation (no toggling)
bind v select-window -t neovim:nvim-v    # <prefix>v → neovim window
bind k select-window -t neovim:opencode-k # <prefix>k → opencode window
bind h select-window -t neovim:term-h      # <prefix>h → term window

# Kill all windows and exit container (with confirmation)
bind q confirm-before -p "Kill all windows and exit container? (y/n) " kill-server
