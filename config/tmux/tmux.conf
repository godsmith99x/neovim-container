set -g mouse on
set-option -g history-limit 5000
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Ms=\\E]52;%p1%s;%p2%s\\007"
set-environment -g COLORTERM "truecolor"
set-environment -g LANG "C.UTF-8"
set -g allow-passthrough on
set -g set-clipboard on

# Alternate prefix
set-option -g prefix2 M-z
bind-key M-z send-prefix -2

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Toggle opencode popup (Alt+z o)
# From main session: opens popup with opencode-bg
# From opencode-bg session: detaches (closes popup, keeps opencode running)
bind o run-shell '\
  if [ "$(tmux display-message -p #{session_name})" = "neovim" ]; then \
    tmux display-popup -w90% -h90% -E "tmux attach-session -t opencode-bg"; \
  else \
    tmux detach-client; \
  fi'

# Terminal popup (Alt+z t)
# From main session: opens popup with terminal-bg
# From terminal-bg session: detaches (closes popup, keeps terminal running)
bind t run-shell '\
  if [ "$(tmux display-message -p #{session_name})" = "neovim" ]; then \
    tmux display-popup -w90% -h90% -E "tmux attach-session -t terminal-bg"; \
  else \
    tmux detach-client; \
  fi'
